<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Devesh Chandra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --text: #1d1d1f;
      --text2: #48484a;
      --text3: #86868b;
      --accent: #5e5ce6;
      --accent-lt: rgba(94,92,230,0.10);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height: 100%; }
    body { 
      min-height: 100vh; 
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Top bar - unchanged */
    .top-bar {
      background: rgba(245,245,247,0.85);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .top-bar-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      display: flex; align-items: center; gap: 0.45rem;
      font-family: 'Outfit', sans-serif; font-size: 0.875rem;
      color: var(--text2); text-decoration: none;
      padding: 0.4rem 0.9rem; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s cubic-bezier(0.23,1,0.32,1);
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateX(-2px); }
    .bar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 400; color: var(--text3);
    }
    .bar-actions { display: flex; align-items: center; gap: 0.75rem; }

    .btn-download, .btn-print {
      /* All button styles unchanged - keeping your original design */
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.5rem 1rem;
      font-family: 'Outfit', sans-serif; font-size: 0.875rem;
      border-radius: 8px; cursor: pointer;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.23,1,0.32,1);
      box-shadow: var(--shadow-sm);
    }
    .btn-download {
      gap: 0.5rem; padding: 0.5rem 1.3rem;
      background: var(--accent); color: #fff; font-weight: 500;
      border: none;
      box-shadow: 0 2px 10px rgba(94,92,230,0.28);
      position: relative; overflow: hidden;
    }
    .btn-download::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(94,92,230,0.38); }
    .btn-download:hover::before { opacity: 1; }
    .btn-print {
      background: var(--surface); color: var(--text2); font-weight: 400;
      border: 1px solid var(--border2);
    }
    .btn-print:hover { color: var(--text); border-color: rgba(0,0,0,0.2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-download svg { width: 15px; height: 15px; }
    .btn-print svg { width: 14px; height: 14px; }
    svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Full height PDF container */
    .pdf-wrap {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      animation: fadeUp 0.6s cubic-bezier(0.23,1,0.32,1) 0.15s both;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    .pdf-card {
      flex: 1;
      width: 100%; max-width: 850px;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.05);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    
    .pdf-card-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
      flex-shrink: 0;
    }
    
    .traffic-dot { width: 12px; height: 12px; border-radius: 50%; }
    .td-red   { background: #ff5f57; }
    .td-yel   { background: #ffbd2e; }
    .td-grn   { background: #28c840; }
    .pdf-filename {
      margin-left: 0.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      color: var(--text3); letter-spacing: 0.08em;
    }
    
    /* Full natural size PDF viewer */
    .pdf-viewer-container {
      flex: 1;
      overflow: auto;
      /* Native PDF dimensions - no scaling */
      min-height: 1123px; /* Standard US Letter height in pixels (8.5x11in @ 132dpi) */
      width: 100%;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.2) transparent;
      position: relative;
    }
    
    .pdf-viewer-container::-webkit-scrollbar {
      width: 8px;
    }
    .pdf-viewer-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .pdf-viewer-container::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
    }
    .pdf-viewer-container::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,0.4);
    }
    
    embed.pdf-viewer {
      width: 794px;  /* Standard US Letter width in pixels (8.5in @ 94dpi) */
      height: 1123px; /* Standard US Letter height in pixels */
      max-width: 100%;
      margin: 0 auto;
      border: none; display: block;
      background: #fafafa;
      /* Critical: Force 100% zoom/native size */
      transform-origin: top center;
      transform: scale(1);
    }

    .pdf-meta {
      width: 100%; max-width: 850px;
      margin-top: 1rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
      flex-shrink: 0;
    }
    .pdf-meta-tag {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--text3); letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .pdf-meta-tag span { color: var(--text2); }

    /* Print styles */
    @media print {
      body * { visibility: hidden; }
      .pdf-card, .pdf-card * { visibility: visible; }
      .pdf-card { 
        box-shadow: none; border: none; 
        max-width: none; width: 100%;
      }
      .pdf-card-header, .top-bar, .pdf-meta { display: none; }
      .pdf-viewer-container { 
        overflow: visible; 
        min-height: auto; 
        height: auto;
      }
      embed.pdf-viewer { 
        width: 100%; 
        height: auto;
        max-width: 8.5in;
      }
    }
  </style>
</head>
<body>
  <!-- Top bar unchanged -->
  <header class="top-bar">
    <div class="top-bar-left">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <div class="bar-title">Devesh Chandra — Resume</div>
    </div>
    <div class="bar-actions">
      <button class="btn-print" onclick="window.print()">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <a href="assets/resume_Devesh.pdf" download="Devesh_Chandra_Resume.pdf" class="btn-download">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </a>
    </div>
  </header>

  <div class="pdf-wrap">
    <div class="pdf-card">
      <div class="pdf-card-header">
        <div class="traffic-dot td-red"></div>
        <div class="traffic-dot td-yel"></div>
        <div class="traffic-dot td-grn"></div>
        <span class="pdf-filename">resume_Devesh.pdf</span>
      </div>
      
      <div class="pdf-viewer-container">
        <embed
          src="assets/resume_Devesh.pdf"
          class="pdf-viewer"
          type="application/pdf"
        >
        </div>
    </div>

    <div class="pdf-meta">
      <div class="pdf-meta-tag">
        ↳ <span>Devesh Chandra</span> · Data Endgineer & Full-Stack Developer
      </div>
      <div class="pdf-meta-tag">
        Last updated <span>2026</span>
      </div>
    </div>
  </div>
</body>
</html>
